      return v.replace(/^["']|["']$/g, "");

      var v = (
        getComputedStyle(document.documentElement).getPropertyValue(name) || ""

      var n = parseInt(v, 10);
      return isNaN(n) ? defaultValue : n;

    // ─── localStorage dismissal (anon + member fallback)

    var LS_KEY = "yodev_beta_offer_dismissed";

    function isLocallyDismissed() {
      try {
        return !!localStorage.getItem(LS_KEY);
      } catch (e) {
        return false;
      }
    }

    function setLocallyDismissed() {
      try {
        localStorage.setItem(LS_KEY, "1");
      } catch (e) {
        console.warn("[yodev-beta-offer] could not write localStorage:", e);
      }
    }

    // Splash uses its own dismissal key so it's independent of the banner —
    // dismissing the once-only splash must NOT hide the persistent banner.
    var SPLASH_LS_KEY = "yodev_beta_splash_dismissed";

    function isSplashLocallyDismissed() {
      try {
        return !!localStorage.getItem(SPLASH_LS_KEY);
      } catch (e) {
        return false;
      }
    }

    function setSplashLocallyDismissed() {
      try {

      } catch (e) {
        console.warn("[yodev-beta-offer] could not write splash localStorage:", e);
      }

    // ─── Server-side dismissal (logged-in member + field configured)
    // PUT /u/<username>.json with user_fields[<id>]=1 (form-urlencoded).
    // Best-effort: never throws, logs failures.

    function persistMemberDismissal(username, fieldId, csrfToken) {
      if (!username || !fieldId) return;
      var body = "user_fields%5B" + fieldId + "%5D=1";
      fetch("/u/" + encodeURIComponent(username) + ".json", {
        method: "PUT",
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded",
          "X-CSRF-Token": csrfToken || "",
        },
        body: body,
      })
        .then(function (res) {
          if (!res.ok) {
            console.warn(
              "[yodev-beta-offer] dismissal PUT returned " + res.status +
              " — falling back to localStorage only"
            );
          } else {
            console.log("[yodev-beta-offer] member dismissal persisted server-side");
          }
        })
        .catch(function (e) {
          console.warn("[yodev-beta-offer] dismissal PUT failed:", e);
        });
    }

    // ─── Banner DOM builder

    // Build the sub line with the brand tokens (worX / Workplace) accented,
    // using DOM nodes (never innerHTML) so it's injection-safe across locales.
    function buildSubWithBrands(textStr) {
      var frag = document.createDocumentFragment();
      var pieces = String(textStr).split(/(worX|Workplace)/);
      for (var i = 0; i < pieces.length; i++) {
        if (pieces[i] === "worX" || pieces[i] === "Workplace") {
          var b = document.createElement("b");
          b.textContent = pieces[i];
          frag.appendChild(b);
        } else if (pieces[i]) {
          frag.appendChild(document.createTextNode(pieces[i]));
        }
      }
      return frag;
    }

    function buildBanner(parts, ctaHref, onDismiss) {
      // Promotional card: accent eyebrow + bright headline, a muted detail line,
      // then a gradient CTA. Glass surface with an atmospheric glow. Reflows on the
      // card's OWN width via a container query (it lives in #main-outlet, not
      // full-width) — the CTA goes full-width when the column is narrow.
      var banner = document.createElement("div");
      banner.className =
        "yodev-beta-banner" + (parts.member ? " yodev-beta-banner--member" : "");

      // Dismiss — anchored top-right of the card
      var dismiss = document.createElement("button");
      dismiss.className = "yodev-beta-banner__dismiss";
      dismiss.setAttribute("aria-label", "Dismiss");
      dismiss.innerHTML = "&times;";
      dismiss.addEventListener("click", onDismiss, { once: true });

      var content = document.createElement("div");
      content.className = "yodev-beta-banner__content";

      var lead = document.createElement("div");
      lead.className = "yodev-beta-banner__lead";

      var eyebrow = document.createElement("span");
      eyebrow.className = "yodev-beta-banner__eyebrow";
      eyebrow.textContent = parts.tag;

      // <div>, NOT <h2>: Discourse themes style headings, and an h2 rule was
      // observed washing the headline to muted/uppercase. A div + own class avoids it.
      var headline = document.createElement("div");
      headline.className = "yodev-beta-banner__headline";
      headline.textContent = parts.headline;

      lead.appendChild(eyebrow);
      lead.appendChild(headline);

      var sub = document.createElement("p");
      sub.className = "yodev-beta-banner__sub";
      sub.appendChild(buildSubWithBrands(parts.sub));

      // CTA(s) — first-party app URLs, same tab. Primary = the offer / app entry;
      // the secondary "Learn more" drives homepage click-throughs for visitors who
      // arrived on Discourse cold and don't yet know the platform. Shown to everyone
      // (anon AND logged-in members — a member landing here has no offer context
      // either), and it softens the "am I being sent to a signup form?" read.
      var ctas = document.createElement("div");
      ctas.className = "yodev-beta-banner__ctas";

      var cta = document.createElement("a");
      cta.className = "yodev-beta-banner__cta";
      cta.href = ctaHref;
      var ctaLabel = document.createElement("span");
      ctaLabel.textContent = parts.cta;
      var arrow = document.createElement("span");
      arrow.className = "yodev-beta-banner__arrow";
      arrow.setAttribute("aria-hidden", "true");
      arrow.textContent = "→";
      cta.appendChild(ctaLabel);
      cta.appendChild(arrow);
      ctas.appendChild(cta);

      if (parts.learnMore) {
        var cta2 = document.createElement("a");
        cta2.className = "yodev-beta-banner__cta2";
        cta2.href = parts.learnMoreHref || ctaHref;
        cta2.textContent = parts.learnMore;
        ctas.appendChild(cta2);
      }

      content.appendChild(lead);
      content.appendChild(sub);
      content.appendChild(ctas);

      banner.appendChild(dismiss);
      banner.appendChild(content);
      return banner;
    }

    // ─── Signup panel DOM builder

    function buildSignupPanel(copy) {
      var panel = document.createElement("div");
      panel.className = "yodev-beta-signup-panel";

      var tag = document.createElement("span");
      tag.className = "yodev-beta-signup-panel__tag";
      tag.textContent = copy.tag;

      title.className = "yodev-beta-signup-panel__title";
      title.textContent = copy.signupTitle;

      var body = document.createElement("p");
      body.className = "yodev-beta-signup-panel__body";
      body.textContent = copy.signupBody;

      panel.appendChild(tag);
      panel.appendChild(title);
      panel.appendChild(body);
      return panel;
    }

    // ─── Splash DOM builder (homepage-style beta landing) ────────────────────
    // hero → Workplace (title + 6-feature card + screenshot + integrations) →
    // Developer Marketplace (title + Employer/Developer cards + dev profile
    // cards) → "ready to build" banner. Discourse-restricted: inline SVG, no
    // CDNs. onDismiss fires on ×, "continue", the backdrop, or any CTA click.

    var SVG_NS = "http://www.w3.org/2000/svg";

    function svgIcon(paths, size) {
      var svg = document.createElementNS(SVG_NS, "svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("fill", "none");
      svg.setAttribute("stroke", "currentColor");
      svg.setAttribute("stroke-width", "1.7");
      svg.setAttribute("stroke-linecap", "round");
      svg.setAttribute("stroke-linejoin", "round");
      svg.setAttribute("width", size || 20);
      svg.setAttribute("height", size || 20);
      paths.forEach(function (node) {
        // A node is either a path "d" string, or {t:'circle', cx, cy, r} etc.
        if (typeof node === "string") {
          var p = document.createElementNS(SVG_NS, "path");
          p.setAttribute("d", node);
          svg.appendChild(p);
        } else {
          var el = document.createElementNS(SVG_NS, node.t);
          for (var k in node) {
            if (k !== "t" && node.hasOwnProperty(k)) el.setAttribute(k, node[k]);
          }
          svg.appendChild(el);
        }
      });
      return svg;
    }

    // AI-Assisted modal — opened from a feature row's (AI Assisted) tag. Appends
    // to <body> above the splash; closes on backdrop click, the ×, or Escape.
    function showAiModal(title, items) {
      var overlay = document.createElement("div");
      overlay.className = "yodev-beta-splash__aimodal";
      function close() {
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        document.removeEventListener("keydown", onKey);
      }
      function onKey(e) { if (e.key === "Escape") close(); }

      var backdrop = document.createElement("div");
      backdrop.className = "yodev-beta-splash__aimodal-backdrop";
      backdrop.addEventListener("click", close);

      var box = document.createElement("div");
      box.className = "yodev-beta-splash__aimodal-box";

      var x = document.createElement("button");
      x.className = "yodev-beta-splash__aimodal-x";
      x.setAttribute("aria-label", "Close");
      x.innerHTML = "&times;";
      x.addEventListener("click", close);

      var head = document.createElement("div");
      head.className = "yodev-beta-splash__aimodal-head";
      var zap = document.createElement("span");
      zap.className = "yodev-beta-splash__aimodal-zap";
      zap.appendChild(svgIcon(ICON_ZAP, 16));
      var h = document.createElement("h3");
      h.className = "yodev-beta-splash__aimodal-title";
      h.textContent = title;
      var pill = document.createElement("span");
      pill.className = "yodev-beta-splash__aimodal-pill";
      pill.textContent = "Business";
      head.appendChild(zap);
      head.appendChild(h);
      head.appendChild(pill);

      var ul = document.createElement("ul");
      ul.className = "yodev-beta-splash__aimodal-list";
      items.forEach(function (it) {
        var li = document.createElement("li");
        var chk = document.createElement("span");
        chk.className = "yodev-beta-splash__check";
        chk.appendChild(svgIcon(ICON_CHECK, 14));
        var sp = document.createElement("span");
        sp.textContent = it;
        li.appendChild(chk);
        li.appendChild(sp);
        ul.appendChild(li);
      });

      box.appendChild(x);
      box.appendChild(head);
      box.appendChild(ul);
      overlay.appendChild(backdrop);
      overlay.appendChild(box);
      (document.body || document.documentElement).appendChild(overlay);
      document.addEventListener("keydown", onKey);
    }

        var fd = document.createElement("p");
        fd.className = "yodev-beta-splash__worx-feat-desc";
        fd.textContent = f.desc;
        body.appendChild(ft);
        body.appendChild(fd);
        row.appendChild(fIcon);
        row.appendChild(body);
        feats.appendChild(row);
      });
      card.appendChild(feats);

      var outcome = document.createElement("div");
      outcome.className = "yodev-beta-splash__worx-outcome";
      var o1 = document.createElement("p");
      o1.className = "yodev-beta-splash__worx-outcome1";
      o1.textContent = data.outcome1;
      var o2 = document.createElement("p");
      o2.className = "yodev-beta-splash__worx-outcome2";
      o2.textContent = data.outcome2;
      outcome.appendChild(o1);
      outcome.appendChild(o2);
      card.appendChild(outcome);

      var cta = document.createElement("a");
      cta.className = "yodev-beta-splash__worx-cta";
      cta.href = ctaHref;
      cta.textContent = data.cta;
      card.appendChild(cta);

      return card;
    }

    function buildSplash(copy, isLoggedIn, ctaHref, onDismiss) {
      var ctaLabel = isLoggedIn ? copy.memberCta : copy.anonCta;
      var worxCards = WORX_CARDS[getLocale()] || WORX_CARDS.en;

      var overlay = document.createElement("div");
      overlay.className = "yodev-beta-splash";
      overlay.setAttribute("role", "dialog");
      overlay.setAttribute("aria-modal", "true");

      var backdrop = document.createElement("div");
      backdrop.className = "yodev-beta-splash__backdrop";
      backdrop.addEventListener("click", onDismiss, { once: true });

      var card = document.createElement("div");
      card.className = "yodev-beta-splash__card";

      var glow = document.createElement("div");
      glow.className = "yodev-beta-splash__glow";
      card.appendChild(glow);

      var dismiss = document.createElement("button");
      dismiss.className = "yodev-beta-splash__dismiss";
      dismiss.setAttribute("aria-label", "Dismiss");
      dismiss.innerHTML = "&times;";
      dismiss.addEventListener("click", onDismiss, { once: true });
      card.appendChild(dismiss);

      var content = document.createElement("div");
      content.className = "yodev-beta-splash__content";

      var reveals = [];
      function add(el) { content.appendChild(el); reveals.push(el); }

      // ── Hero ──
      var hero = document.createElement("div");
      hero.className = "yodev-beta-splash__hero";
      var eyebrow = document.createElement("div");
      eyebrow.className = "yodev-beta-splash__eyebrow";
      var logo = document.createElement("span");
      logo.className = "yodev-beta-splash__logo";
      logo.textContent = "{yo}";
      var pill = document.createElement("span");
      pill.className = "yodev-beta-splash__pill";
      pill.textContent = copy.splashEyebrow;
      eyebrow.appendChild(logo);
      eyebrow.appendChild(pill);
      hero.appendChild(eyebrow);
      var headline = document.createElement("h2");
      headline.className = "yodev-beta-splash__headline";
      headline.textContent = isLoggedIn ? copy.splashHeadlineMember : copy.splashHeadlineAnon;
      hero.appendChild(headline);
      var sub = document.createElement("p");
      sub.className = "yodev-beta-splash__sub";
      sub.textContent = isLoggedIn ? copy.splashSubMember : copy.splashSubAnon;
      hero.appendChild(sub);
      // Primary CTA + a quiet "Learn more" (same homepage target) so the splash
      // doesn't read as "click = straight to a signup form" — matches the banner.
      var heroCtas = document.createElement("div");
      heroCtas.className = "yodev-beta-splash__hero-ctas";
      heroCtas.appendChild(makeCta(ctaLabel, ctaHref, "yodev-beta-splash__cta--hero", onDismiss));
      heroCtas.appendChild(makeCta(copy.learnMore, ctaHref, "yodev-beta-splash__cta--learn", onDismiss));
      hero.appendChild(heroCtas);
      add(hero);

      // ── Workplace ── the homepage marquee (title + text above the image) is the
      // section's lead-in, so no separate generic "Workplace" heading.
      add(buildWorkMarquee(
        copy.splashWorkMarqueeTitle,
        copy.splashWorkMarqueeSub,
        "workplace.yodev.dev",
        WORKPLACE_MARQUEE_IMG,
        "yoDEV Workplace"
      ));
      add(buildWorkFeatures(copy.splashWorkFeatures));
      add(buildIntegrations(copy.splashIntegrationsTitle, copy.splashIntegrations));

      // ── worX ── the two homepage audience cards (For Businesses / For Freelancers).
      add(buildSectionTitle("worX", copy.splashMarketTagline));
      var cards = document.createElement("div");
      cards.className = "yodev-beta-splash__cards";
      cards.appendChild(buildWorxCard(worxCards.biz, ICON_BUILDING, ctaHref));
      cards.appendChild(buildWorxCard(worxCards.dev, ICON_CODE, ctaHref));
      add(cards);
      add(buildDevCards(copy)); // sample dev-profile cards, right under the worX cards

      // ── Banner ──
      var banner = document.createElement("div");
      banner.className = "yodev-beta-splash__banner";
      var btext = document.createElement("div");
      var bt = document.createElement("h3");
      bt.className = "yodev-beta-splash__banner-title";
      bt.textContent = copy.splashBannerTitle;
      var bs = document.createElement("p");
      bs.className = "yodev-beta-splash__banner-sub";
      // Members already have the platform — never show them the "free for 90 days"
      // offer copy (they'd read it as an expiry on their permanent access).
      bs.textContent = isLoggedIn ? copy.splashBannerSubMember : copy.splashBannerSub;
      btext.appendChild(bt);
      btext.appendChild(bs);
      banner.appendChild(btext);
      banner.appendChild(makeCta(ctaLabel, ctaHref, "yodev-beta-splash__cta--banner", onDismiss));
      add(banner);

      // ── Footer bits ──
      var foot = document.createElement("p");
      foot.className = "yodev-beta-splash__footnote";
      // Same reason: the anon footnote says "reverts to Free after 90 days", which
      // is false for a permanent member. Members get the "included with membership" line.
      foot.textContent = isLoggedIn ? copy.splashFootnoteMember : copy.splashFootnote;
      content.appendChild(foot);
      var cont = document.createElement("button");
      cont.className = "yodev-beta-splash__continue";
      cont.textContent = copy.splashContinue;
      cont.addEventListener("click", onDismiss, { once: true });
      content.appendChild(cont);

      card.appendChild(content);
      overlay.appendChild(backdrop);
      overlay.appendChild(card);

      reveals.forEach(function (el, i) {
        el.classList.add("yodev-beta-splash__reveal");
        el.style.animationDelay = 110 + i * 70 + "ms";
      });

      return overlay;
    }

    function insertSplash(splashEl) {
      if (document.querySelector(".yodev-beta-splash")) {
        console.log("[yodev-beta-offer] splash already present; skipping");
        return;
      }
      (document.body || document.documentElement).appendChild(splashEl);
      console.log("[yodev-beta-offer] splash inserted");
    }

    // ─── Poll helper
    // Tries querySelector(selector) every intervalMs until found or timeout.
    // Calls callback(el) with the first match, or callback(null) on timeout.

    function pollFor(selector, timeoutMs, intervalMs, callback) {
      var elapsed = 0;
      var el = document.querySelector(selector);
      if (el) {
        callback(el);
        return;
      }
      var id = setInterval(function () {
        elapsed += intervalMs;
        var found = document.querySelector(selector);
        if (found) {
          clearInterval(id);
          callback(found);
          return;
        }
        if (elapsed >= timeoutMs) {
          clearInterval(id);
          callback(null);
        }
      }, intervalMs);
    }

    // ─── Banner insertion
    // [SELECTOR NOTE] Primary target: #main-outlet (Discourse's standard main
    // content container since at least v2.8; present in v2026.5). The banner
    // is prepended inside it so it appears above all page content.
    // If #main-outlet isn't present (unlikely but possible with heavy theme
    // customisation), we fall back to document.body prepend.
    // To adjust: search DevTools for the outermost content wrapper div.

    function insertBanner(bannerEl) {
      // Guard: don't double-insert (e.g. if init() somehow runs twice)
      if (document.querySelector(".yodev-beta-banner")) {
        console.log("[yodev-beta-offer] banner already present; skipping insert");
        return;
      }

      // [SELECTOR — VERIFY ON REAL DISCOURSE] #main-outlet is the standard
      // wrapper. Some themes or layouts may rename it or add wrapper divs.
      var BANNER_CONTAINER_SELECTOR = "#main-outlet";

      pollFor(BANNER_CONTAINER_SELECTOR, 10000, 200, function (container) {
        if (!container) {
          // Fallback: prepend to body so the banner still shows
          console.warn(
            "[yodev-beta-offer] could not find banner container " +
            BANNER_CONTAINER_SELECTOR +
            " after 10s — falling back to document.body prepend"
          );
          container = document.body;
        }
        // Double-check again in case the interval fired twice
        if (document.querySelector(".yodev-beta-banner")) return;
        container.insertBefore(bannerEl, container.firstChild);
        console.log(
          "[yodev-beta-offer] banner inserted into " +
          (container.id ? "#" + container.id : container.tagName)
        );
      });
    }

    // ─── Signup panel insertion
    // [SELECTOR NOTE] Discourse's signup modal/fullpage uses several containers
    // depending on version and whether it's a modal or a fullpage route:
    //   .create-account            — modal wrapper (most common, v2.8+)
    //   .signup-fullpage           — fullpage signup layout (newer route-based)
    //   .login-fullpage            — same for /login
    //   .d-modal.create-account    — modal variant with Glimmer components
    //   .auth-form                 — inner form in some versions
    // We try a compound selector. If none matches after ~10s, we warn and skip.
    // To adjust: open /signup in DevTools, inspect the first prominent wrapper.

    var SIGNUP_CONTAINER_SELECTOR = [
      ".create-account",
      ".signup-fullpage",
      ".login-fullpage",
      ".d-modal.create-account",
      ".auth-form",
    ].join(", ");

    function insertSignupPanel(panelEl) {
      // Guard double-insert
      if (document.querySelector(".yodev-beta-signup-panel")) {
        console.log("[yodev-beta-offer] signup panel already present; skipping");
        return;
      }

      console.log(
        "[yodev-beta-offer] signup/login page detected — polling for form container"
      );
      console.log(
        "[yodev-beta-offer] trying selectors: " + SIGNUP_CONTAINER_SELECTOR
      );

      // [SELECTOR — VERIFY ON REAL DISCOURSE] See note above.
      pollFor(SIGNUP_CONTAINER_SELECTOR, 10000, 200, function (container) {
        if (!container) {
          console.warn(
            "[yodev-beta-offer] could not find signup form container " +
            "(" + SIGNUP_CONTAINER_SELECTOR + ") after 10s — panel not inserted. " +
            "Check selector against live Discourse DevTools."
          );
          return;
        }
        if (document.querySelector(".yodev-beta-signup-panel")) return;
        container.insertBefore(panelEl, container.firstChild);
        console.log(
          "[yodev-beta-offer] signup panel inserted before " +
          (container.className ? "." + container.className.split(" ")[0] : container.tagName)
        );
      });
    }

    // ─── Main init

    function init() {
      var s = readSettings();
      console.log("[yodev-beta-offer] settings (from CSS vars):", s);

      var locale = getLocale();
      var copy = COPY[locale];
      console.log("[yodev-beta-offer] locale:", locale);

      // Fetch session to determine auth state. We need this before rendering.
      fetch("/session/current.json", { credentials: "same-origin" })
        .then(function (res) {
          if (!res.ok) {
            console.warn(
              "[yodev-beta-offer] /session/current.json status " + res.status +
              " — treating as anonymous"
            );
            return null;
          }
          return res.json();
        })
        .then(function (data) {
          var currentUser = data && data.current_user ? data.current_user : null;
          var isLoggedIn = !!currentUser;
          var username = isLoggedIn ? currentUser.username : null;

          console.log(
            "[yodev-beta-offer] auth state: " + (isLoggedIn ? "member (" + username + ")" : "anonymous")
          );

          // ── Dismissal check ──────────────────────────────────────────────
          var isDismissed = false;

          if (isLoggedIn && s.dismissedFieldId > 0) {
            // Cross-device dismissal via Discourse User Field
            var fieldKey = "user_field_" + s.dismissedFieldId;
            var fieldVal =
              currentUser.custom_fields &&
              currentUser.custom_fields[fieldKey];
            isDismissed = !!fieldVal;
            if (isDismissed) {
              console.log(
                "[yodev-beta-offer] dismissed (user field " + fieldKey + " = " +
                fieldVal + ")"
              );
            }
          } else {
            // Anonymous or no field configured — check localStorage
            isDismissed = isLocallyDismissed();
            if (isDismissed) {
              console.log("[yodev-beta-offer] dismissed (localStorage)");
            }
          }

          // ── CSRF token (needed for the dismissal PUT) ────────────────────
          var csrfMeta = document.querySelector('meta[name="csrf-token"]');
          var csrfToken = csrfMeta ? csrfMeta.getAttribute("content") : "";

          // ── Decide CTA href ──────────────────────────────────────────────
          var ctaHref;
          if (isLoggedIn && s.marketplaceUrl) {
            ctaHref = s.marketplaceUrl;
          } else {
            ctaHref = s.ctaUrl || "https://yodev.dev";
          }

          // ── Banner (every page, unless dismissed) ────────────────────────
          if (!isDismissed) {
            var bannerParts = {
              tag: isLoggedIn ? copy.memberTag : copy.tag,
              headline: isLoggedIn ? copy.memberHeadline : copy.anonHeadline,
              sub: copy.sub,
              member: isLoggedIn,
              cta: isLoggedIn ? copy.memberCta : copy.anonCta,
              learnMore: copy.learnMore,
            };

            var bannerEl = buildBanner(bannerParts, ctaHref, function () {
              console.log("[yodev-beta-offer] banner dismissed by user");
              setLocallyDismissed();
              if (isLoggedIn && s.dismissedFieldId > 0) {
                persistMemberDismissal(username, s.dismissedFieldId, csrfToken);
              }
            });

            insertBanner(bannerEl);
          }

          // ── Splash (full-screen, once-ever, anon + member, any page) ─────
          // Independent of the banner's dismissal. Suppressed on /signup and
          // /login (those already get the panel). splash_enabled gates it.
          var sp = window.location.pathname || "";
          var onAuthPage =
            sp.indexOf("/signup") === 0 || sp.indexOf("/login") === 0;

          if (s.splashEnabled && !onAuthPage) {
            var splashDismissed;
            if (isLoggedIn && s.splashDismissedFieldId > 0) {
              var splashKey = "user_field_" + s.splashDismissedFieldId;
              splashDismissed = !!(
                currentUser.custom_fields &&
                currentUser.custom_fields[splashKey]
              );
            } else {
              splashDismissed = isSplashLocallyDismissed();
            }

            if (splashDismissed) {
              console.log("[yodev-beta-offer] splash already dismissed; skipping");
            } else {
              var splashDone = false;
              var splashEl = buildSplash(copy, isLoggedIn, ctaHref, function () {
                if (splashDone) return;
                splashDone = true;
                console.log("[yodev-beta-offer] splash dismissed/clicked");
                setSplashLocallyDismissed();
                if (isLoggedIn && s.splashDismissedFieldId > 0) {
                  persistMemberDismissal(username, s.splashDismissedFieldId, csrfToken);
                }
                if (splashEl && splashEl.parentNode) {
                  splashEl.parentNode.removeChild(splashEl);
                }
              });
              insertSplash(splashEl);
            }
          }

          // ── Signup / Login panel ─────────────────────────────────────────
          // Show on /signup and /login regardless of dismissed state (the
          // panel is informational context for the form, not an interruptive
          // ad). Does not have a dismiss button.
          var path = window.location.pathname || "";
          if (
            path === "/signup" ||
            path.indexOf("/signup") === 0 ||
            path === "/login" ||
            path.indexOf("/login") === 0
          ) {
            var panelEl = buildSignupPanel(copy);
            insertSignupPanel(panelEl);
          }
        })
        .catch(function (e) {
          console.warn("[yodev-beta-offer] error fetching session:", e);
          // Graceful degradation: show anonymous banner if session fetch fails
          var locale2 = getLocale();
          var copy2 = COPY[locale2];
          var s2 = readSettings();
          var ctaHref2 = s2.ctaUrl || "https://yodev.dev";

          if (!isLocallyDismissed()) {
            var bannerEl2 = buildBanner(
              { tag: copy2.tag, headline: copy2.anonHeadline, sub: copy2.sub, member: false, cta: copy2.anonCta, learnMore: copy2.learnMore },
              ctaHref2,
              function () {
                setLocallyDismissed();
                console.log("[yodev-beta-offer] banner dismissed (fallback mode)");
              }
            );
            insertBanner(bannerEl2);
          }
        });
    }

    // Run after DOM is available (head_tag runs early, so guard readyState)
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
</script>
